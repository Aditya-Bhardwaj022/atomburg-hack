spring.application.name=Atomburg
spring.jackson.serialization.write-dates-as-timestamps=false
spring.mvc.problemdetails.enabled=true
spring.datasource.url=${DB_URL:jdbc:h2:mem:atomburg;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Calcutta
spring.jpa.properties.hibernate.format_sql=true

# Low-Memory Cloud Container Optimizations (Render/Railway Free Tier)
# 1. Lazy Initialization (Dramatically speeds up boot time and saves RAM)
spring.main.lazy-initialization=true

# 2. Limit Tomcat Threads (Saves ~150MB of thread stack overhead)
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2
server.tomcat.max-connections=100
server.tomcat.accept-count=10
